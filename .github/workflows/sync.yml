name: Sync AtCoder Submissions

on:
  schedule:
    - cron: '0 15 * * *' # 毎日 日本時間の深夜0時に実行
  workflow_dispatch: # 手動で「Run workflow」ボタンを押した時にも実行可能

permissions:
  contents: write # リポジトリにコードを書き込む権限を付与

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # GitHub公式機能

      - name: Set up Python
        uses: actions/setup-python@v5 # GitHub公式機能
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run sync script
        env:
          ATCODER_USER_ID: ${{ secrets.ATCODER_USER_ID }}
        run: python sync.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          
          # 変更がある場合のみコミットする
          if git diff-index --quiet HEAD --; then
            echo "No changes to commit"
          else
            git commit -m "Auto-sync AtCoder submissions"
            git push
          fi
